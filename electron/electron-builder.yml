# electron-builder 多平台打包配置
# Ubuntu 工具箱桌面版

appId: com.ubuntu-toolbox.desktop
productName: Ubuntu 工具箱
copyright: Copyright © 2026 yangsir
electronVersion: 33.0.0

# 通用文件
files:
  - src/main/**/*
  - src/preload/**/*
  - src/renderer/**/*
  - node_modules/**/*

# 额外资源文件（用于 Flask 项目，不打入 asar）
extraResources:
  - from: ../
    to: ../
    filter:
      - app.py
      - scripts/**/*
      - templates/**/*
      - static/**/*
      - requirements.txt

# nsis 自定义配置
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Ubuntu 工具箱

# dmg 配置 (macOS)
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications



# Linux 配置
linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: yangsir <yangsir@example.com>
  icon: assets/icon.png
  executableName: ubuntu-toolbox-desktop
  # AppImage 文件名
  artifactName: "${productName}-${version}.${ext}"
  desktop:
    MimeType:
      - text/html
      - text/xml
  # AppImage 需要把 .desktop 和图标放在 squashfs-root 同一级
  fileAssociations:
    - ext: sh
      name: Shell Script
      description: Shell installation script
      mimeType: application/x-shellscript

# extraResources 改为直接复制 assets，避免路径问题
# （extraResources 是给打包后的 resources/ 目录用，和 asar=false 配合）

# macOS 配置
mac:
  target:
    - dmg
  category: public.app-category.utilities
  icon: assets/icon.icns

# Windows 配置
win:
  target:
    - nsis
  icon: assets/icon.ico

# 不使用 ASAR（Flask 项目文件需要能被 subprocess 读取）
asar: false
compression: maximum
